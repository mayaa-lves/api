openapi: 3.0.2
info:
  title: API de Artesanatos da Maya
  description: Documentação completa do sistema de gestão de produtos (Artesanato e Confeitaria).
  version: 1.0.0

servers:
  - url: https://api-one-delta-89.vercel.app
    description: Api em produção (Vercel)

components:
  security:
    - BearerAuth: []
    

paths:
  /:
    get:
      summary: Boas-vindas da API
      description: Retorna informações básicas sobre a versão e autoria da API.
      responses:
        200:
          description: Sucesso.
          content:
            application/json:
              example: {"api": "API do sistema de artesanato (Treino)", "author": "Maya", "version": "1.0"}
  /login:
    post:
      summary: Realiza login para obter o token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuario: {type: string, example: "admin"}
                senha: {type: string, example: "sua_senha"}
      responses:
        200:
          description: Login realizado. Copie o token retornado.
        401:
          description: Usuário ou senha inválidos.

  /produtos:
    get:
      summary: Listar todos os produtos
      description: Retorna uma lista de todos os produtos cadastrados no Firebase Firestore.
      responses:
        200:
          description: Lista de produtos retornada com sucesso.

  /produtos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID numérico do produto.
        schema:
          type: integer
    get:
      summary: Buscar produto por ID
      description: Retorna os detalhes de um produto específico.
      responses:
        200:
          description: Produto encontrado.
        404:
          description: Produto não encontrado no banco de dados.
    put:
      summary: Atualizar produto (Total)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome: {type: string}
                preco: {type: number}
                descricao: {type: string}
                categoria: {type: string}
      responses:
        200:
          description: Produto atualizado com sucesso.
        401:
          description: Acesso negado (Token inválido).
    patch:
      summary: Atualizar produto (Parcial)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Envie apenas os campos que deseja alterar.
      responses:
        200:
          description: Produto atualizado com sucesso.
    delete:
      summary: Excluir produto
      security:
        - BearerAuth: []
      responses:
        200:
          description: Produto removido com sucesso.

  /criarprodutos:
    post:
      summary: Criar um novo produto
      description: Adiciona um produto ao Firebase e atualiza automaticamente o contador de ID.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, preco, descricao, categoria]
              properties:
                nome: {type: string, example: "Vaso de Flores"}
                preco: {type: number, example: 25.50}
                descricao: {type: string, example: "Artesanato feito com limpa cachimbos"}
                categoria: {type: string, example: "Decoração"}
      responses:
        201:
          description: Produto criado com sucesso!
        400:
          description: Dados inválidos ou incompletos.
        401:
          description: Acesso negado.